function getColor(tier) {
  if (tier === 'hot') return '#e63946';
  if (tier === 'warm') return '#f4a261';
  return '#457b9d';
}

function makeIcon(tier, viols) {
  const color = getColor(tier);
  const size = tier === 'hot' ? 36 : 30;
  const label = viols > 1 ? viols : '!';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size+8}">
    <circle cx="${size/2}" cy="${size/2}" r="${size/2-2}" fill="${color}" stroke="white" stroke-width="2.5"/>
    <text x="${size/2}" y="${size/2+5}" text-anchor="middle" fill="white" font-size="${tier==='hot'?14:12}" font-weight="bold" font-family="Arial">${label}</text>
    <polygon points="${size/2-5},${size-4} ${size/2+5},${size-4} ${size/2},${size+6}" fill="${color}"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    iconSize: [size, size+8],
    iconAnchor: [size/2, size+8],
    popupAnchor: [0, -(size+8)],
    className: ''
  });
}

let geocoded = 0;
const total = leads.length;

async function geocodeAndPin(lead, index) {
  // Stagger requests to avoid rate limiting
  await new Promise(r => setTimeout(r, index * 300));
  try {
    const q = encodeURIComponent(lead.addr);
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1`, {
      headers: { 'Accept-Language': 'en', 'User-Agent': 'PRR-Drive-By-Map/1.0' }
    });
    const data = await res.json();
    if (data && data[0]) {
      const lat = parseFloat(data[0].lat);
      const lng = parseFloat(data[0].lon);
      const color = getColor(lead.tier);
      const navUrl = `https://maps.google.com/?q=${encodeURIComponent(lead.addr)}`;
      const isEstate = lead.owner && /HEIRS OF|LIFE ESTATE|LIFE EST|ET AL|LAND TRUST/i.test(lead.owner);
      const ownerBlock = lead.owner
        ? `${isEstate ? `<div style="margin:8px 0 2px;padding:4px 9px;background:#4a1d96;border-radius:6px;font-size:11px;font-weight:700;color:#fff;letter-spacing:0.5px;">ESTATE — PRIORITY CONTACT</div>` : ''}
           <div style="margin:${isEstate?'2px':'8px'} 0 4px;padding:7px 9px;background:${isEstate?'#f5f0ff':'#f0f4ff'};border-radius:7px;border-left:3px solid ${isEstate?'#7c3aed':'#457b9d'};">
            <strong>Owner:</strong> ${lead.owner}<br>
            ${lead.phone ? `<strong>Phone:</strong> <a href="tel:${lead.phone.replace(/\D/g,'')}" style="color:#1d4ed8;">${lead.phone}</a><br>` : ''}
            ${lead.mailAddr ? `<strong>Mail to:</strong> ${lead.mailAddr}` : ''}
           </div>`
        : `<div style="margin:8px 0 4px;padding:6px 9px;background:#fff8e1;border-radius:7px;border-left:3px solid #f4a261;font-size:11px;color:#92400e;">
            Skip trace needed — owner not yet loaded
           </div>`;
      const popup = `
        <div class="popup-title">${lead.name}</div>
        <span class="popup-badge ${lead.tier === 'hot' ? 'badge-hot' : lead.tier === 'warm' ? 'badge-hot' : ''}" style="background:${color}">
          ${lead.tier === 'hot' ? '🔥 TIER 1 HOT' : lead.tier === 'warm' ? '🟠 UNSAFE OPEN' : '🔵 OPEN VIOLATION'}
        </span>
        <div class="popup-body">
          <strong>Violations:</strong> ${lead.viols}<br>
          <strong>Open since:</strong> ${lead.openSince}<br><br>
          ${lead.desc}
        </div>
        ${ownerBlock}
        <a class="popup-nav" href="${navUrl}" target="_blank">📍 Navigate</a>
      `;
      L.marker([lat, lng], { icon: makeIcon(lead.tier, lead.viols) })
        .bindPopup(popup, { maxWidth: 300 })
        .addTo(map);
    }
  } catch(e) {
    console.error('Geocode failed for', lead.name, e);
  }
  geocoded++;
  document.getElementById('count').innerHTML = geocoded < total
    ? `Geocoding… ${geocoded}/${total}`
    : `✅ ${geocoded} stops loaded`;
}

leads.forEach((lead, i) => geocodeAndPin(lead, i));
